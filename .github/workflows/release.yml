name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    name: Windows (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install MinGW cross-compiler
        run: sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-gnu --bin tx --bin rx

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: |
            target/x86_64-pc-windows-gnu/release/tx.exe
            target/x86_64-pc-windows-gnu/release/rx.exe

  build-linux:
    name: Linux (x86_64 static)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl toolchain
        run: sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-musl --bin tx --bin rx

      - name: Rename binaries
        run: |
          cp target/x86_64-unknown-linux-musl/release/tx tx-linux-x86_64
          cp target/x86_64-unknown-linux-musl/release/rx rx-linux-x86_64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: |
            tx-linux-x86_64
            rx-linux-x86_64

  release:
    name: Create Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows-x86_64/tx.exe
            windows-x86_64/rx.exe
            linux-x86_64/tx-linux-x86_64
            linux-x86_64/rx-linux-x86_64
          body: |
            ## RustPIC ${{ github.ref_name }}

            Standalone binaries — no installation required.

            | File | Platform |
            |------|----------|
            | `tx.exe` / `rx.exe` | Windows 64-bit |
            | `tx-linux-x86_64` / `rx-linux-x86_64` | Linux 64-bit (static, musl) |

            ### Usage

            **Encode a file into a WAV (callsign is required):**
            ```
            tx --input photo.jpg --output photo.wav --callsign HB9TOB --mod 64qam --rate 3/4
            ```

            **Decode a WAV — every transmission found inside is written out:**
            ```
            rx --input recording.wav --outdir .
            ```

            ### OFDM parameters

            - Sample rate: 48 kHz (native, no resampling)
            - FFT: 1024, CP: 256, symbol period: 26.67 ms
            - **42 active subcarriers**, spacing **46.875 Hz**
            - Band: **562.5 – 2484.4 Hz** (pilot 0 above the NBFM audio HPF corner)
